<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invitación Humberto & Jessica</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #eef2e2 0%, #e2eacc 55%, #d4dfb0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      position: relative;
    }

    /* ── Ramas de plantas en las esquinas (img/plantas.png) ── */
    .corner-plant {
      position: fixed;
      width: min(42vw, 190px);
      height: auto;
      pointer-events: none;
      z-index: 1;
      opacity: 0.92;
    }
    .corner-plant.tl { top: -8px;  left: -8px; }
    .corner-plant.tr { top: -8px;  right: -8px; transform: scaleX(-1); }
    .corner-plant.bl { bottom: -8px; left: -8px; transform: scaleY(-1); }
    .corner-plant.br { bottom: -8px; right: -8px; transform: scale(-1,-1); }

    /* ── Contenido ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px 20px;
    }

    /* ── Encabezado ── */
    .header {
      text-align: center;
      animation: fadeDown 1s ease forwards;
    }
    .header-pre {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 4px;
      color: #6b7c3d;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .header-names {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 7vw, 2.8rem);
      color: #4a5828;
      line-height: 1.1;
      text-shadow: 1px 2px 8px rgba(74,88,40,0.12);
    }
    .amp {
      font-family: 'Montserrat', sans-serif;
      font-style: normal;
      font-weight: 300;
      font-size: 0.65em;
      vertical-align: middle;
      padding: 0 2px;
    }
    .header-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: #8a9a50;
      text-transform: uppercase;
      margin-top: 5px;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Divisor ── */
    .divider-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #8a9a50, transparent);
    }

    /* ── Sobre abierto con foto asomando ── */
    @keyframes envelopeGlow {
      0%,100% { filter: drop-shadow(0 6px 18px rgba(107,124,61,0.30)); }
      50%      { filter: drop-shadow(0 6px 36px rgba(107,124,61,0.65)); }
    }
    .envelope {
      position: relative;
      z-index: 10;
      width: min(88vw, 380px);
      margin-top: 92px;
      cursor: pointer;
      animation: envelopeGlow 2.8s ease-in-out infinite;
      transition: transform 0.15s ease;
    }
    .envelope:active { transform: scale(0.97); }
    .env-back { position:relative; z-index:1; }
    .env-back svg, .env-front svg, .env-top-flap svg { width:100%; height:auto; display:block; }
    .env-top-flap {
      position: absolute;
      left: 0;
      bottom: 100%;
      width: 100%;
      z-index: 2;
    }
    .env-front {
      position: absolute;
      inset: 0;
      z-index: 4;
      width: 100%;
      height: 100%;
    }
    .photo-peek {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: -32%;
      width: 55%;
      transform: translateX(-50%);
    }
    .photo-peek img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
      padding: 6px 6px 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      border-radius: 1px;
    }

    /* ── Flecha curva hacia el hint ── */
    .open-arrow {
      width: 34px; height: 34px;
      margin: 2px auto -4px;
      opacity: 0.7;
    }

    /* ── Hint ── */
    .hint {
      text-align: center;
      animation: pulse 2.2s ease-in-out infinite;
      transition: opacity 0.3s;
    }
    .hint.hidden { opacity:0; pointer-events:none; }
    .hint-icon { font-size:1.2rem; display:block; margin-bottom:4px; }
    .hint p {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.66rem;
      letter-spacing: 3px;
      color: #000000;
      text-transform: uppercase;
    }
    @keyframes pulse {
      0%,100% { transform:scale(1);    opacity:0.8; }
      50%      { transform:scale(1.1);  opacity:1;   }
    }
  </style>
</head>
<body>

<!-- Ramas de plantas en las 4 esquinas -->
<img class="corner-plant tl" src="img/plantas.png" alt=""/>
<img class="corner-plant tr" src="img/plantas.png" alt=""/>
<img class="corner-plant bl" src="img/plantas.png" alt=""/>
<img class="corner-plant br" src="img/plantas.png" alt=""/>
<audio id="music" loop preload="auto">
  <source src="Que Suerte Tenerte.mp3" type="audio/mpeg">
</audio>

<div class="content">

  <!-- Encabezado -->
  <div class="header">
    <div class="header-pre">Una invitación especial</div>
    <div class="header-names">Humberto <span class="amp">&amp;</span> Jessica</div>
    <div class="header-date">Boda · 10 de Octubre · 2026</div>
  </div>

  <div class="divider-line"></div>

  <!-- Sobre abierto con foto asomando -->
  <div class="envelope" onclick="abrir()">

    <!-- Solapa superior abierta (detrás de la foto) -->
    <div class="env-top-flap">
      <svg viewBox="0 0 360 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="flapCrm3" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%"   stop-color="#e8e0d0"/>
            <stop offset="100%" stop-color="#f4efe2"/>
          </linearGradient>
        </defs>
        <polygon points="2,90 180,6 358,90" fill="url(#flapCrm3)" stroke="#c8b890" stroke-width="0.8" stroke-opacity="0.5"/>
      </svg>
    </div>

    <!-- Foto tipo polaroid asomando -->
    <div class="photo-peek">
      <img src="img/foto.jpg" alt="Humberto y Jessica"/>
    </div>

    <!-- Cuerpo del sobre (fondo) -->
    <div class="env-back">
      <svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="papelCrm" x="0%" y="0%" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" result="n"/>
            <feColorMatrix type="saturate" values="0" in="n" result="g"/>
            <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
          </filter>
          <linearGradient id="cuerpo" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#fdfaf2"/>
            <stop offset="50%"  stop-color="#f8f4e8"/>
            <stop offset="100%" stop-color="#f2ece0"/>
          </linearGradient>
        </defs>

        <!-- Cuerpo crema -->
        <rect width="360" height="240" rx="7" fill="url(#cuerpo)"/>
        <rect width="360" height="240" rx="7" fill="#f8f4e8" filter="url(#papelCrm)" opacity="0.35"/>

        <!-- Borde exterior -->
        <rect width="360" height="240" rx="7" fill="none" stroke="#b8cc70" stroke-width="1.8"/>

        <!-- Líneas decorativas de esquina -->
        <line x1="18" y1="18" x2="44" y2="18" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
        <line x1="18" y1="18" x2="18" y2="44" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
        <line x1="342" y1="18" x2="316" y2="18" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
        <line x1="342" y1="18" x2="342" y2="44" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
        <line x1="18"  y1="222" x2="44"  y2="222" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
        <line x1="18"  y1="222" x2="18"  y2="196" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
        <line x1="342" y1="222" x2="316" y2="222" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
        <line x1="342" y1="222" x2="342" y2="196" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
      </svg>
    </div>

    <!-- Solapa inferior (frente del sobre, tapa la parte baja de la foto) -->
    <div class="env-front">
      <svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="flapCrm2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#f4efe2"/>
            <stop offset="100%" stop-color="#e8e0d0"/>
          </linearGradient>
        </defs>
        <!-- Solapas laterales (tapan los bordes de la foto, de esquina superior a la punta) -->
        <polygon points="7,7 7,233 180,148" fill="url(#flapCrm2)" stroke="#c8b890" stroke-width="0.8" stroke-opacity="0.5"/>
        <polygon points="353,7 353,233 180,148" fill="url(#flapCrm2)" stroke="#c8b890" stroke-width="0.8" stroke-opacity="0.5"/>

        <!-- Solapa inferior -->
        <polygon points="0,240 180,148 360,240" fill="url(#flapCrm2)" stroke="#c8b890" stroke-width="0.8" stroke-opacity="0.5"/>

        <!-- Sello H&J sobre la punta de la solapa -->
        <image href="img/sello-crop.png" x="141" y="109" width="78" height="78" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.25));"/>
      </svg>
    </div>
  </div>

  <!-- Flecha curva -->
  <svg class="open-arrow" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 8 Q6 26 26 26" stroke="#6b7c3d" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M18 21 L26 26 L21 33" stroke="#6b7c3d" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <!-- Hint -->
  <div class="hint" id="hint">
    <p>Toca para abrir</p>
  </div>

</div>

<script>
  let abriendo = false;
  function abrir() {
    if (abriendo) return;
    abriendo = true;
    document.getElementById('hint').classList.add('hidden');
    const music = document.getElementById('music');
    music.play().catch(()=>{});
    setTimeout(()=>{
      sessionStorage.setItem('musicTime', music.currentTime);
      sessionStorage.setItem('musicPlay', '1');
      window.location.href = 'invitation.html';
    }, 300);
  }
</script>
</body>
</html>
