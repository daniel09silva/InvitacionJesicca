<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invitación Jessica & Humberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #eef2e2 0%, #e2eacc 55%, #d4dfb0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      position: relative;
    }

    /* ── Flores de fondo ── */
    .bg-flowers {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Contenido ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px 20px;
    }

    /* ── Encabezado ── */
    .header {
      text-align: center;
      animation: fadeDown 1s ease forwards;
    }
    .header-pre {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 4px;
      color: #6b7c3d;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .header-names {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 7vw, 2.8rem);
      color: #4a5828;
      line-height: 1.1;
      text-shadow: 1px 2px 8px rgba(74,88,40,0.12);
    }
    .header-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: #8a9a50;
      text-transform: uppercase;
      margin-top: 5px;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Divisor ── */
    .divider-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #8a9a50, transparent);
    }

    /* ── Sobre ── */
    @keyframes envelopeGlow {
      0%,100% { filter: drop-shadow(0 6px 18px rgba(107,124,61,0.30)); }
      50%      { filter: drop-shadow(0 6px 36px rgba(107,124,61,0.65)); }
    }
    .envelope {
      position: relative;
      z-index: 10;
      width: min(88vw, 400px);
      cursor: pointer;
      animation: envelopeGlow 2.8s ease-in-out infinite;
      transition: transform 0.15s ease;
    }
    .envelope:active { transform: scale(0.97); }

    /* ── Hint ── */
    .hint {
      text-align: center;
      animation: pulse 2.2s ease-in-out infinite;
      transition: opacity 0.3s;
    }
    .hint.hidden { opacity:0; pointer-events:none; }
    .hint-icon { font-size:1.2rem; display:block; margin-bottom:4px; }
    .hint p {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.66rem;
      letter-spacing: 3px;
      color: #6b7c3d;
      text-transform: uppercase;
    }
    @keyframes pulse {
      0%,100% { transform:scale(1);    opacity:0.8; }
      50%      { transform:scale(1.1);  opacity:1;   }
    }
  </style>
</head>

<script>
  let abriendo = false;
  function abrir() {
    if (abriendo) return;
    abriendo = true;
    document.getElementById('hint').classList.add('hidden');
    const music = document.getElementById('music');
    music.play().catch(()=>{});
    setTimeout(()=>{
      sessionStorage.setItem('musicTime', music.currentTime);
      sessionStorage.setItem('musicPlay', '1');
      window.location.href = 'invitation.html';
    }, 300);
  }
</script>
