<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invitación Humberto & Jessica</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #eef2e2 0%, #e2eacc 55%, #d4dfb0 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      position: relative;
    }

    /* ── Ramas de plantas en las esquinas (img/plantas.png) ── */
    .corner-plant {
      position: fixed;
      width: min(42vw, 190px);
      height: auto;
      pointer-events: none;
      z-index: 1;
      opacity: 0.92;
    }
    .corner-plant.tl { top: -8px;  left: -8px; }
    .corner-plant.tr { top: -8px;  right: -8px; transform: scaleX(-1); }
    .corner-plant.bl { bottom: -8px; left: -8px; transform: scaleY(-1); }
    .corner-plant.br { bottom: -8px; right: -8px; transform: scale(-1,-1); }

    /* ── Contenido ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 24px 20px;
    }

    /* ── Encabezado ── */
    .header {
      text-align: center;
      animation: fadeDown 1s ease forwards;
    }
    .header-pre {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 4px;
      color: #6b7c3d;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .header-names {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 7vw, 2.8rem);
      color: #4a5828;
      line-height: 1.1;
      text-shadow: 1px 2px 8px rgba(74,88,40,0.12);
    }
    .amp {
      font-family: 'Montserrat', sans-serif;
      font-style: normal;
      font-weight: 300;
      font-size: 0.65em;
      vertical-align: middle;
      padding: 0 2px;
    }
    .header-date {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: #8a9a50;
      text-transform: uppercase;
      margin-top: 5px;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Divisor ── */
    .divider-line {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #8a9a50, transparent);
    }

    /* ── Sobre ── */
    @keyframes envelopeGlow {
      0%,100% { filter: drop-shadow(0 6px 18px rgba(107,124,61,0.30)); }
      50%      { filter: drop-shadow(0 6px 36px rgba(107,124,61,0.65)); }
    }
    .envelope {
      position: relative;
      z-index: 10;
      width: min(88vw, 400px);
      cursor: pointer;
      animation: envelopeGlow 2.8s ease-in-out infinite;
      transition: transform 0.15s ease;
    }
    .envelope:active { transform: scale(0.97); }

    /* ── Hint ── */
    .hint {
      text-align: center;
      animation: pulse 2.2s ease-in-out infinite;
      transition: opacity 0.3s;
    }
    .hint.hidden { opacity:0; pointer-events:none; }
    .hint-icon { font-size:1.2rem; display:block; margin-bottom:4px; }
    .hint p {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.66rem;
      letter-spacing: 3px;
      color: #6b7c3d;
      text-transform: uppercase;
    }
    @keyframes pulse {
      0%,100% { transform:scale(1);    opacity:0.8; }
      50%      { transform:scale(1.1);  opacity:1;   }
    }
  </style>
</head>
<body>

<!-- Ramas de plantas en las 4 esquinas -->
<img class="corner-plant tl" src="img/plantas.png" alt=""/>
<img class="corner-plant tr" src="img/plantas.png" alt=""/>
<img class="corner-plant bl" src="img/plantas.png" alt=""/>
<img class="corner-plant br" src="img/plantas.png" alt=""/>
<audio id="music" loop preload="auto">
  <source src="Que Suerte Tenerte.mp3" type="audio/mpeg">
</audio>

<div class="content">

  <!-- Encabezado -->
  <div class="header">
    <div class="header-pre">Una invitación especial</div>
    <div class="header-names">Humberto <span class="amp">&amp;</span> Jessica</div>
    <div class="header-date">Boda · 10 de Octubre · 2026</div>
  </div>

  <div class="divider-line"></div>

  <!-- Sobre SVG crema con sello olivo -->
  <div class="envelope" onclick="abrir()">
    <svg viewBox="0 0 360 252" xmlns="http://www.w3.org/2000/svg"
         style="width:100%;height:auto;display:block;border-radius:8px;">
      <defs>
        <filter id="papelCrm" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" result="n"/>
          <feColorMatrix type="saturate" values="0" in="n" result="g"/>
          <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
        </filter>
        <linearGradient id="cuerpo" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#fdfaf2"/>
          <stop offset="50%"  stop-color="#f8f4e8"/>
          <stop offset="100%" stop-color="#f2ece0"/>
        </linearGradient>
        <linearGradient id="flapCrm" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#f0ebe0"/>
          <stop offset="100%" stop-color="#e8e0d0"/>
        </linearGradient>
        <linearGradient id="flapSello" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#4a5828"/>
          <stop offset="100%" stop-color="#6b7c3d"/>
        </linearGradient>
      </defs>

      <!-- Cuerpo crema -->
      <rect width="360" height="252" rx="7" fill="url(#cuerpo)"/>
      <rect width="360" height="252" rx="7" fill="#f8f4e8" filter="url(#papelCrm)" opacity="0.35"/>

      <!-- Flap superior -->
      <polygon points="0,0 360,0 180,124" fill="url(#flapCrm)"/>

      <!-- Sombras laterales -->
      <polygon points="0,0 0,252 145,126"   fill="rgba(0,0,0,0.04)"/>
      <polygon points="360,0 360,252 215,126" fill="rgba(0,0,0,0.04)"/>

      <!-- Triángulo inferior -->
      <polygon points="0,252 180,132 360,252" fill="#ede8da"/>

      <!-- Bordes pliegue -->
      <line x1="0"   y1="0"   x2="180" y2="124" stroke="#c8b890" stroke-width="0.8" opacity="0.5"/>
      <line x1="360" y1="0"   x2="180" y2="124" stroke="#c8b890" stroke-width="0.8" opacity="0.5"/>
      <line x1="0"   y1="252" x2="180" y2="132" stroke="#c8b890" stroke-width="0.8" opacity="0.5"/>
      <line x1="360" y1="252" x2="180" y2="132" stroke="#c8b890" stroke-width="0.8" opacity="0.5"/>

      <!-- Borde exterior -->
      <rect width="360" height="252" rx="7" fill="none" stroke="#b8cc70" stroke-width="1.8"/>

      <!-- ═══ SELLO FLORAL OLIVO ═══ centrado en 180,112 -->
      <g transform="translate(180,112)">

        <!-- Corazón olivo -->
        <path d="M 0,42 C -2,38 -54,16 -54,-7
                 C -54,-31 -36,-40 -18,-28
                 C -9,-23 0,-13 0,-13
                 C 0,-13 9,-23 18,-28
                 C 36,-40 54,-31 54,-7
                 C 54,16 2,38 0,42 Z"
              fill="rgba(107,124,61,0.08)" stroke="url(#flapSello)" stroke-width="2" stroke-linejoin="round"/>

        <!-- Flor bump izquierdo -->
        <g transform="translate(-25,-27)">
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#6b7c3d" transform="rotate(0)"   opacity="0.85"/>
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#8a9a50" transform="rotate(72)"  opacity="0.85"/>
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#6b7c3d" transform="rotate(144)" opacity="0.85"/>
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#8a9a50" transform="rotate(216)" opacity="0.85"/>
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#6b7c3d" transform="rotate(288)" opacity="0.85"/>
          <circle cx="0" cy="0" r="4.5" fill="#4a5828"/>
        </g>

        <!-- Flor bump derecho -->
        <g transform="translate(25,-27)">
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#8a9a50" transform="rotate(0)"   opacity="0.85"/>
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#6b7c3d" transform="rotate(72)"  opacity="0.85"/>
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#8a9a50" transform="rotate(144)" opacity="0.85"/>
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#6b7c3d" transform="rotate(216)" opacity="0.85"/>
          <ellipse cx="0" cy="-6" rx="3.8" ry="6" fill="#8a9a50" transform="rotate(288)" opacity="0.85"/>
          <circle cx="0" cy="0" r="4.5" fill="#4a5828"/>
        </g>

        <!-- Hojas laterales izq -->
        <ellipse cx="-44" cy="-3" rx="11" ry="4"  fill="#8a9a50" transform="rotate(-48,-44,-3)" opacity="0.7"/>
        <ellipse cx="-42" cy="13" rx="10" ry="3.5" fill="#6b7c3d" transform="rotate(-22,-42,13)" opacity="0.65"/>
        <ellipse cx="-32" cy="27" rx="9"  ry="3"   fill="#8a9a50" transform="rotate(-8,-32,27)"  opacity="0.6"/>

        <!-- Hojas laterales der -->
        <ellipse cx="44" cy="-3" rx="11" ry="4"  fill="#8a9a50" transform="rotate(48,44,-3)"  opacity="0.7"/>
        <ellipse cx="42" cy="13" rx="10" ry="3.5" fill="#6b7c3d" transform="rotate(22,42,13)"  opacity="0.65"/>
        <ellipse cx="32" cy="27" rx="9"  ry="3"   fill="#8a9a50" transform="rotate(8,32,27)"   opacity="0.6"/>

        <!-- Rosa central olivo -->
        <g transform="translate(0,13)">
          <ellipse cx="0" cy="-8" rx="4.5" ry="7.5" fill="#8a9a50" transform="rotate(0)"   opacity="0.9"/>
          <ellipse cx="0" cy="-8" rx="4.5" ry="7.5" fill="#6b7c3d" transform="rotate(72)"  opacity="0.9"/>
          <ellipse cx="0" cy="-8" rx="4.5" ry="7.5" fill="#8a9a50" transform="rotate(144)" opacity="0.9"/>
          <ellipse cx="0" cy="-8" rx="4.5" ry="7.5" fill="#6b7c3d" transform="rotate(216)" opacity="0.9"/>
          <ellipse cx="0" cy="-8" rx="4.5" ry="7.5" fill="#8a9a50" transform="rotate(288)" opacity="0.9"/>
          <circle cx="0" cy="0" r="5.5" fill="#4a5828"/>
        </g>

        <!-- Tallo -->
        <line x1="0" y1="42" x2="0" y2="52" stroke="#6b7c3d" stroke-width="1.8" stroke-linecap="round"/>
        <ellipse cx="-8" cy="50" rx="7" ry="2.8" fill="#8a9a50" transform="rotate(-35,-8,50)" opacity="0.65"/>
        <ellipse cx=" 8" cy="50" rx="7" ry="2.8" fill="#8a9a50" transform="rotate(35,8,50)"  opacity="0.65"/>

        <!-- Puntitos olivo -->
        <circle cx="-46" cy="5"  r="2" fill="#8a9a50" opacity="0.6"/>
        <circle cx="-36" cy="22" r="2" fill="#6b7c3d" opacity="0.6"/>
        <circle cx=" 46" cy="5"  r="2" fill="#8a9a50" opacity="0.6"/>
        <circle cx=" 36" cy="22" r="2" fill="#6b7c3d" opacity="0.6"/>
        <circle cx="  0" cy="40" r="2" fill="#6b7c3d" opacity="0.6"/>
      </g>

      <!-- Nombre en olivo oscuro -->
      <text x="180" y="210"
            text-anchor="middle"
            font-family="Dancing Script, Georgia, serif"
            font-size="24"
            fill="#4a5828"
            letter-spacing="0.5">Humberto <tspan font-family="Montserrat, sans-serif" font-size="15">&amp;</tspan> Jessica</text>

      <!-- Líneas decorativas de esquina -->
      <line x1="18" y1="18" x2="44" y2="18" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
      <line x1="18" y1="18" x2="18" y2="44" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
      <line x1="342" y1="18" x2="316" y2="18" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
      <line x1="342" y1="18" x2="342" y2="44" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
      <line x1="18"  y1="234" x2="44"  y2="234" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
      <line x1="18"  y1="234" x2="18"  y2="208" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
      <line x1="342" y1="234" x2="316" y2="234" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
      <line x1="342" y1="234" x2="342" y2="208" stroke="#b8cc70" stroke-width="1" opacity="0.7"/>
    </svg>
  </div>

  <!-- Hint -->
  <div class="hint" id="hint">
    <p>Toca para abrir</p>
  </div>

</div>

<script>
  let abriendo = false;
  function abrir() {
    if (abriendo) return;
    abriendo = true;
    document.getElementById('hint').classList.add('hidden');
    const music = document.getElementById('music');
    music.play().catch(()=>{});
    setTimeout(()=>{
      sessionStorage.setItem('musicTime', music.currentTime);
      sessionStorage.setItem('musicPlay', '1');
      window.location.href = 'invitation.html';
    }, 300);
  }
</script>
</body>
</html>
